<div class="app-layout">
  <!-- Barra de Navegación Superior (Navbar) -->
  <header class="navbar">
    <div class="navbar-content">
      <div class="navbar-brand" routerLink="/inicio">
        <!-- Logotipo SVG: Gorro de Cocinero -->
        <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 18H18V21H6V18Z"></path>
          <path d="M12 2C9.5 2 7.5 3.5 6.5 5.5C5.5 5 4.5 5 4 5.5C3 6.5 3.5 8.5 4.5 10C4 11.5 3.5 13.5 4.5 15C5.5 16.5 7.5 17 12 17C16.5 17 18.5 16.5 19.5 15C20.5 13.5 20 11.5 19.5 10C20.5 8.5 21 6.5 20 5.5C19.5 5 18.5 5 17.5 5.5C16.5 3.5 14.5 2 12 2Z"></path>
        </svg>
        <span class="brand-name">GourmetApp</span>
      </div>

      <nav class="navbar-nav">
        <a 
          routerLink="/inicio" 
          routerLinkActive="active-link" 
          [routerLinkActiveOptions]="{exact: true}" 
          class="nav-link"
        >
          Inicio
        </a>
        <a 
          routerLink="/agregar" 
          routerLinkActive="active-link" 
          class="nav-link"
        >
          Agregar Receta
        </a>
        <a 
          routerLink="/favoritos" 
          routerLinkActive="active-link" 
          class="nav-link"
        >
          Favoritos
        </a>
      </nav>
    </div>
  </header>

  <!-- Contenedor Principal de Vistas -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Pie de Página -->
  <footer class="app-footer">
    <div class="footer-content">
      <p>&copy; 2026 GourmetApp - Gestor de Recetas Culinarias. Evaluación Segundo Parcial.</p>
    </div>
  </footer>
</div>
